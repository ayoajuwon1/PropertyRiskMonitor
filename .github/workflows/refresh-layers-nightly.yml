name: Refresh NPRM Core Layers (Nightly)

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-core-layers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run job:core
      - name: Commit data changes
        run: |
          if git diff --quiet; then
            echo "No data change to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/location-cells.json data/layer-metadata.json data/source-versions.json
          git commit -m "chore(data): nightly refresh of NPRM core layers"
          git push
